<section class="hero">
  <div class="hero__content">
    <h1 class="hero__title">Collect Feedback,<br />Unlock Ideas</h1>
    <div class="hero__mobile-wrapper">
      <img class="hero__mobile-pic" src="hero-mobile-phone/mobile-pic.png" alt="Poll App preview" />
      <img class="hero__mobile-bubble" src="hero-mobile-phone/typing-bubble.png" alt="" />
      <img class="hero__mobile-check" src="hero-mobile-phone/check.png" alt="" />
    </div>
    <p class="hero__description">
      Create and share surveys in minutes – from team events to workplace
      culture. Collect opinions, engage your audience, and turn feedback into
      action.
    </p>
    <a class="hero__btn" routerLink="/create">
      <span>New survey</span>
      <img class="hero__btn-icon" src="icons/add_circle.png" alt="" />
    </a>
  </div>

  <div class="hero__visual">
    <div class="hero__phone-wrapper">
      <img class="hero__phone" src="hero-mobile-phone/mobile-phone.png" alt="Poll App preview" />
      <img class="hero__float hero__float--bubble" src="hero-mobile-phone/typing-bubble.png" alt="" />
      <img class="hero__float hero__float--question" src="hero-mobile-phone/question-mark.png" alt="" />
      <img class="hero__float hero__float--star" src="hero-mobile-phone/star.png" alt="" />
      <img class="hero__float hero__float--check" src="hero-mobile-phone/check.png" alt="" />
    </div>
  </div>
</section>
