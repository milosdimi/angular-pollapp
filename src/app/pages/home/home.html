<div class="container">
  <div class="content">
    <app-navbar theme="dark" />
    <app-hero />
    <section class="your-surveys">
      <h2 class="your-surveys__title">Your surveys</h2>

      @if (isLoading()) {
        <app-spinner />
      } @else if (loadError()) {
        <p class="state-msg state-msg--error">{{ loadError() }}</p>
      } @else {
        <app-ending-soon [surveys]="endingSoon()" (cardClick)="onCardClick($event)" />
        <app-survey-list [surveys]="surveys()" (cardClick)="onCardClick($event)" />
      }
    </section>
  </div>
</div>
<app-footer />
