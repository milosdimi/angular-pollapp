<article class="card" (click)="onClick()">
  <div class="content">
    <div class="text-group">
      @if (survey().category) {
        <span class="category">{{ survey().category }}</span>
      }
      <h3 class="title">{{ survey().title }}</h3>
    </div>
    <div class="badge-row">
      <app-deadline-badge [endDate]="survey().end_date" />
    </div>
  </div>
</article>
