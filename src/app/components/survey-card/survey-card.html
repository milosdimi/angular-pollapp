<article class="card" (click)="onClick()">
  @if (survey().category) {
    <span class="category">
      <img class="category__icon" [src]="categoryIcon(survey().category!)" alt="" />
      {{ survey().category }}
    </span>
  }
  <h3 class="title">{{ survey().title }}</h3>
  <div class="badge-row">
    <app-deadline-badge [endDate]="survey().end_date" />
  </div>
</article>
